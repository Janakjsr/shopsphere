upstream customer_web {
  server customer-web:3000;
}

upstream admin_web {
  server admin-web:3001;
}

upstream api_server {
  server api:4000;
}

server {
  listen 80;
  server_name localhost;

  location /api/ {
    proxy_pass http://api_server/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api-docs {
    proxy_pass http://api_server/api-docs;
    proxy_set_header Host $host;
  }

  location /admin/ {
    proxy_pass http://admin_web/;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://customer_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

