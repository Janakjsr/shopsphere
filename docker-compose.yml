services:
  postgres:
    image: postgres:16-alpine
    container_name: shopsphere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopsphere}
      POSTGRES_USER: ${POSTGRES_USER:-shopsphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopsphere}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopsphere} -d ${POSTGRES_DB:-shopsphere}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: shopsphere-api
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://shopsphere:shopsphere@postgres:5432/shopsphere?schema=public
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  customer-web:
    build:
      context: .
      dockerfile: apps/customer-web/Dockerfile
    container_name: shopsphere-customer-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_APP_ENV: local
    ports:
      - "3000:3000"
    depends_on:
      - api

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    container_name: shopsphere-admin-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_APP_ENV: local
    ports:
      - "3001:3001"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: shopsphere-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - customer-web
      - admin-web
      - api

volumes:
  postgres-data:

